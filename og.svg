<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="RecallBook — patients that come back on time. A KARYA studio build.">
  <title>RecallBook — patients that come back on time</title>

  <!-- clinical paper base -->
  <rect width="1200" height="630" fill="#F4F7F5"/>

  <!-- faint register rules -->
  <g stroke="#E1E7E3" stroke-width="2">
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="230" x2="1200" y2="230"/>
    <line x1="0" y1="310" x2="1200" y2="310"/>
    <line x1="0" y1="390" x2="1200" y2="390"/>
    <line x1="0" y1="470" x2="1200" y2="470"/>
  </g>

  <!-- emerald accent band down the left, like a register margin -->
  <rect x="0" y="0" width="18" height="630" fill="#059669"/>
  <rect x="90" y="0" width="2" height="630" fill="#D5EDE3"/>

  <!-- logo mark -->
  <g transform="translate(96,74)">
    <rect x="0" y="0" width="72" height="66" rx="10" fill="#059669"/>
    <rect x="0" y="0" width="19" height="66" rx="10" fill="#047857"/>
    <path d="M30 34l11 11 22-24" stroke="#F4F7F5" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- brand name -->
  <text x="188" y="127" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="46" font-weight="800" letter-spacing="-1">
    <tspan fill="#0F1F1A">Recall</tspan><tspan fill="#059669">Book</tspan>
  </text>

  <!-- headline -->
  <text x="96" y="300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="88" font-weight="800" letter-spacing="-3" fill="#0F1F1A">Patients that</text>
  <text x="96" y="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="88" font-weight="800" letter-spacing="-3" fill="#059669">come back on time.</text>

  <!-- tagline -->
  <text x="98" y="474" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="31" font-weight="500" fill="#45564F">Recall engine for clinics — cleanings, refills, vaccinations &amp; checkups.</text>

  <!-- footer row: KARYA wordmark + subscription note -->
  <g transform="translate(96,556)">
    <rect x="0" y="-26" width="150" height="42" rx="21" fill="#059669"/>
    <text x="75" y="2" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="800" letter-spacing="3" fill="#F4F7F5">KARYA</text>
    <text x="172" y="1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" fill="#45564F">studio build · subscription · pricing on discovery</text>
  </g>

  <!-- mini recall-board chip, top-right, echoing the product -->
  <g transform="translate(792,96)">
    <rect x="0" y="0" width="312" height="200" rx="16" fill="#FFFFFF" stroke="#C8D8D0" stroke-width="2"/>
    <text x="24" y="42" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="18" font-weight="700" fill="#0F1F1A">Recall board</text>
    <rect x="244" y="24" width="48" height="26" rx="13" fill="#D5EDE3"/>
    <text x="268" y="42" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#047857">Live</text>

    <text x="24" y="92" font-family="-apple-system, sans-serif" font-size="17" fill="#45564F">Rohan · 🦷 cleaning</text>
    <rect x="196" y="76" width="96" height="24" rx="12" fill="#FBE3E3"/>
    <text x="244" y="93" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#B91C1C">Overdue</text>

    <text x="24" y="132" font-family="-apple-system, sans-serif" font-size="17" fill="#45564F">Aarav · 🦷 cleaning</text>
    <rect x="196" y="116" width="96" height="24" rx="12" fill="#FBEDD8"/>
    <text x="244" y="133" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#B45309">Due today</text>

    <line x1="24" y1="156" x2="288" y2="156" stroke="#E1E7E3" stroke-width="2"/>
    <text x="24" y="182" font-family="-apple-system, sans-serif" font-size="14" fill="#45564F">Due today</text>
    <text x="288" y="182" text-anchor="end" font-family="'SF Mono', Menlo, monospace" font-size="16" font-weight="700" fill="#059669">3</text>
  </g>
</svg>
